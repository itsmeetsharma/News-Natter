name: AI Roast Brief — Fortnightly Recap

on:
  schedule:
    - cron: '30 2 1 * *'    # 1st of month  → 8:00 AM IST
    - cron: '30 2 16 * *'   # 16th of month → 8:00 AM IST
  workflow_dispatch:

jobs:
  fortnightly-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run fortnightly recap
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          GROQ_MODEL:     llama-3.3-70b-versatile
          GEMINI_MODEL:   gemini-2.0-flash
        run: python -c "from agents.monthly_recap_v2 import run_fortnightly_recap; run_fortnightly_recap()"